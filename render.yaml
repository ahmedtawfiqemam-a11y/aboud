services:
  - type: web
    name: aboud-bot
    env: python
    plan: free
    buildCommand: >-
      git clone https://$GITHUB_CLONE_TOKEN@github.com/ahmedtawfiqemam-a11y/SOURCEAboud.git /tmp/src &&
      cp -r /tmp/src/. . &&
      apt-get install -y libmagic1 libmagic-dev nodejs npm golang-go ffmpeg portaudio19-dev &&
      pip install --ignore-installed -r requirements.txt &&
      cd baileys_service && npm install --production && cd .. &&
      bash build_sniper.sh || true
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: GITHUB_CLONE_TOKEN
        sync: false
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: WHISPER_BOT_TOKEN
        sync: false
      - key: QRAN_BOT_TOKEN
        sync: false
      - key: WHATSAPP_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GIST_ID
        sync: false
      - key: The_OwnDev_Can_Run_Only
        value: "ABOUD_87E7CAA14B42BCF73A3D70EB"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: BAILEYS_PORT
        value: "3001"
      - key: PYTHON_WEBHOOK
        value: "http://localhost:5000/wa_webhook"
      - key: PYTHON_VERSION
        value: "3.11.0"
